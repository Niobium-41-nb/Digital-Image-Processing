<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaic Shape Detection</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--bg:#0a0a14;--card:#12122a;--border:#1e1e3f;--accent:#6366f1;--accent2:#06b6d4;--text:#e0e0e0;--muted:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,#1a1a3e,#0f0f2a);padding:20px;text-align:center;border-bottom:1px solid var(--border)}
header h1{font-size:24px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav{display:flex;justify-content:center;gap:0;background:#0d0d20;border-bottom:1px solid var(--border)}
nav button{padding:14px 32px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:15px;border-bottom:3px solid transparent;transition:.2s}
nav button.active{color:var(--accent2);border-bottom-color:var(--accent2)}
nav button:hover{color:#fff}
.container{max-width:1000px;margin:0 auto;padding:24px}
.tab{display:none}
.tab.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:18px}
.card h3{font-size:16px;margin-bottom:14px;color:var(--accent2)}
.row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.col{display:flex;flex-direction:column;gap:6px;min-width:120px}
.col label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.col input[type=range]{width:100%;accent-color:var(--accent)}
.col select,.col input[type=number]{padding:9px 12px;background:#0a0a1a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
.col select:focus,.col input:focus{outline:none;border-color:var(--accent2)}
.col .val{font-size:12px;color:var(--accent2);text-align:center}
.shape-grid{display:flex;flex-wrap:wrap;gap:6px}
.shape-btn{padding:8px 14px;background:#0a0a1a;border:1px solid var(--border);border-radius:8px;color:#ccc;cursor:pointer;font-size:13px;transition:.2s}
.shape-btn:hover{border-color:var(--accent2)}
.shape-btn.selected{background:#1a1a5e;border-color:var(--accent);color:#fff;font-weight:bold}
.btn{padding:10px 24px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:600;transition:.2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.85;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-sm{padding:6px 16px;font-size:12px}
.video-wrap{text-align:center;margin:12px 0}
.video-wrap video{max-width:100%;border-radius:10px;border:1px solid var(--border)}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
.stat-card{background:#0a0a1a;border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center}
.stat-card .val{font-size:28px;font-weight:bold;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .lbl{font-size:12px;color:var(--muted);margin-top:4px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold}
.badge-ok{background:#064e3b;color:#34d399}
.badge-warn{background:#78350f;color:#fbbf24}
.badge-err{background:#7f1d1d;color:#fca5a5}
canvas{max-height:220px}
.loading{text-align:center;padding:40px}
.spinner{display:inline-block;width:36px;height:36px;border:3px solid #333;border-top-color:var(--accent2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.steps{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px}
.steps img{width:100%;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:.2s}
.steps img:hover{transform:scale(1.03);border-color:var(--accent2)}
.steps .step-label{font-size:11px;color:var(--muted);text-align:center;margin-top:4px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
@media(max-width:600px){.chart-row{grid-template-columns:1fr}}
.preview-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.preview-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<header><h1>Mosaic Shape Detection</h1></header>

<nav>
  <button class="active" data-tab="generate">生成视频</button>
  <button data-tab="detect">识别形状</button>
  <button data-tab="captcha">验证码</button>
</nav>

<!-- ============ Tab 1: 生成视频 ============ -->
<div id="tab-generate" class="tab active">
  <div class="container">
    <div class="card">
      <h3>选择形状</h3>
      <div class="shape-grid" id="shapeGrid"></div>
    </div>

    <div class="card">
      <h3>运动参数</h3>
      <div class="row">
        <div class="col" style="min-width:200px;flex:1">
          <label>背景角度: <span id="bgAngleVal">0°</span> (→)</label>
          <input type="range" id="bgAngle" min="0" max="360" value="0" step="1"
                 oninput="updateAngle('bg')">
        </div>
        <div class="col" style="min-width:200px;flex:1">
          <label>形状角度: <span id="shAngleVal">90°</span> (↓)</label>
          <input type="range" id="shAngle" min="0" max="360" value="90" step="1"
                 oninput="updateAngle('sh')">
        </div>
      </div>
      <div class="row" style="margin-top:12px">
        <div class="col">
          <label>块密度: <span id="bsVal">2px</span></label>
          <input type="range" id="blockSize" min="2" max="4" value="2" step="1"
                 oninput="updateBS()">
        </div>
        <div class="col">
          <label>粗细: <span id="thVal">1.0x</span></label>
          <input type="range" id="thickness" min="0.5" max="2.0" value="1.0" step="0.1"
                 oninput="updateTh()">
        </div>
        <div class="col">
          <label>色彩</label>
          <select id="colorMode">
            <option value="1">彩色</option>
            <option value="0">黑白</option>
          </select>
        </div>
        <div class="col">
          <label>时长(秒)</label>
          <input type="number" id="duration" value="4" min="1" max="10" style="width:70px">
        </div>
        <div class="col" style="justify-content:flex-end">
          <button class="btn btn-primary" id="btnGen" onclick="genVideo()">生成视频</button>
        </div>
      </div>
    </div>

    <div id="genLoading" class="loading" style="display:none"><div class="spinner"></div><p>生成中...</p></div>
    <div class="card" id="genCard" style="display:none">
      <h3>预览</h3>
      <div class="video-wrap"><video id="genVid" controls autoplay loop></video></div>
    </div>
  </div>
</div>

<!-- ============ Tab 2: 识别形状 ============ -->
<div id="tab-detect" class="tab">
  <div class="container">
    <div class="card">
      <h3>上传视频</h3>
      <div class="row">
        <input type="file" id="detFile" accept="video/*" style="color:var(--text)">
        <button class="btn btn-primary" id="btnDet" onclick="detect()">开始识别</button>
      </div>
    </div>
    <div id="detLoading" class="loading" style="display:none"><div class="spinner"></div><p>分析中...</p></div>

    <div id="detResult" style="display:none">
      <!-- 结果卡片 -->
      <div class="card">
        <h3>识别结果</h3>
        <div class="result-grid" id="detStats"></div>
        <div id="ocrBars" style="margin-top:14px"></div>
      </div>

      <!-- 过程图 -->
      <div class="card">
        <h3>检测过程</h3>
        <div class="steps" id="detSteps"></div>
      </div>

      <!-- 图表 -->
      <div class="card">
        <h3>分析图表</h3>
        <div class="chart-row">
          <div><canvas id="chartMotion"></canvas></div>
          <div><canvas id="chartGeometry"></canvas></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ============ Tab 3: 验证码 ============ -->
<div id="tab-captcha" class="tab">
  <div class="container">
    <div class="card" style="text-align:center">
      <h3>马赛克动态验证码</h3>
      <p style="color:var(--muted);margin-bottom:12px">观看视频中<strong>形状区域的移动方向</strong>，输入你看到的字母/数字/图形</p>
      <div class="video-wrap"><video id="capVid" controls autoplay loop style="max-width:400px"></video></div>
      <div style="margin:14px 0">
        <input type="text" id="capInput" placeholder="输入答案" maxlength="10"
               style="padding:12px 18px;background:#0a0a1a;border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:20px;width:180px;text-align:center;letter-spacing:4px"
               onkeydown="if(event.key==='Enter')verifyCap()">
      </div>
      <button class="btn btn-primary" onclick="verifyCap()">验证</button>
      <button class="btn btn-sm" onclick="refreshCap()" style="margin-left:8px;background:#1a1a3e;color:#ccc;border:1px solid var(--border);border-radius:8px">换一个</button>
      <div id="capResult" style="margin-top:14px"></div>
    </div>
  </div>
</div>

<script>
// ============ 初始化 ============
const SHAPES = {
  letters: 'A B C D E F G H J K L M N P Q R S T U V W X Y Z'.split(' '),
  numbers: '2 3 4 5 6 7 8 9'.split(' '),
  shapes: 'square circle triangle star hexagon diamond heart cross'.split(' '),
};
let curShape = 'A';

const grid = document.getElementById('shapeGrid');
[...SHAPES.letters, ...SHAPES.numbers, ...SHAPES.shapes].forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'shape-btn' + (s===curShape?' selected':'');
  btn.textContent = s;
  btn.onclick = () => {
    curShape = s;
    document.querySelectorAll('.shape-btn').forEach(b=>b.classList.toggle('selected',b.textContent===s));
  };
  grid.appendChild(btn);
});

// ============ Tab 切换 ============
document.querySelectorAll('nav button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tab-'+b.dataset.tab).classList.add('active');
  };
});

// ============ 角度显示 ============
const DIRS = {0:'→',45:'↗',90:'↓',135:'↘',180:'←',225:'↙',270:'↑',315:'↖',360:'→'};
function updateAngle(which) {
  const el = document.getElementById(which+'Angle');
  const span = document.getElementById(which+'AngleVal');
  let v = parseInt(el.value);
  if(v===360) v=0;
  const dir = DIRS[Math.round(v/45)*45] || '';
  span.textContent = v+'° '+dir;
}
function updateBS() {
  document.getElementById('bsVal').textContent = document.getElementById('blockSize').value+'px';
}
function updateTh() {
  document.getElementById('thVal').textContent = parseFloat(document.getElementById('thickness').value).toFixed(1)+'x';
}

// ============ 生成视频 ============
async function genVideo() {
  const btn = document.getElementById('btnGen');
  btn.disabled = true;
  document.getElementById('genLoading').style.display = 'block';
  document.getElementById('genCard').style.display = 'none';

  try {
    const r = await fetch('/api/generate', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        shape: curShape,
        bg_angle: parseInt(document.getElementById('bgAngle').value),
        shape_angle: parseInt(document.getElementById('shAngle').value),
        block_size: parseInt(document.getElementById('blockSize').value),
        color: document.getElementById('colorMode').value === '1',
        thickness_scale: parseFloat(document.getElementById('thickness').value),
        duration: parseInt(document.getElementById('duration').value)||4,
      }),
    });
    if(!r.ok) throw new Error(await r.text());
    const blob = await r.blob();
    document.getElementById('genVid').src = URL.createObjectURL(blob);
    document.getElementById('genCard').style.display = 'block';
  } catch(e) { alert('Failed: '+e.message); }
  finally {
    btn.disabled = false;
    document.getElementById('genLoading').style.display = 'none';
  }
}

// ============ 识别形状 ============
let detData = null;

async function detect() {
  const f = document.getElementById('detFile').files[0];
  if(!f) { alert('请选择视频文件'); return; }

  document.getElementById('btnDet').disabled = true;
  document.getElementById('detLoading').style.display = 'block';
  document.getElementById('detResult').style.display = 'none';

  try {
    const fd = new FormData(); fd.append('video', f);
    const r = await fetch('/api/detect', { method:'POST', body: fd });
    const data = await r.json();
    if(!r.ok) throw new Error(data.error);
    detData = data;
    renderDetectResult(data);
  } catch(e) { alert('Error: '+e.message); }
  finally {
    document.getElementById('btnDet').disabled = false;
    document.getElementById('detLoading').style.display = 'none';
  }
}

function renderDetectResult(data) {
  document.getElementById('detResult').style.display = 'block';

  // 未检测到形状 — 显示清晰提示
  if(!data.found) {
    document.getElementById('detStats').innerHTML = `
      <div class="stat-card" style="grid-column:1/-1">
        <div class="val" style="font-size:18px;color:#fca5a5">未检测到形状</div>
        <div class="lbl">${data.message||'视频中可能没有不同运动方向的区域'}</div>
      </div>`;
    document.getElementById('ocrBars').innerHTML = '';
    document.getElementById('detSteps').innerHTML = '';
    return;
  }

  // 解析描述提取数值
  const desc = data.description||'';
  const get = (re) => { const m=desc.match(re); return m?m[1]:'-'; };

  // 统计卡片
  const shapeType = get(/【形状类型】\s*(.+)/) || '-';
  // 初始设为 null，后面 OCR 分析会更新
  let letter = null;
  let letterConf = 0;
  const area = get(/形状面积:\s*([\d.]+)/) || '0';
  const areaPct = get(/占画面\s*([\d.]+)%/) || '0';
  const bbox = get(/外接矩形:\s*([\d.]+)\s*[×x]\s*([\d.]+)/);
  const vertices = get(/顶点数量:\s*(\d+)/) || '0';
  const circularity = get(/接近圆:\s*([\d.]+)%/) || '0';

  const stats = [
    {v:shapeType, l:'形状类型'},
    ...(letter?[{v:letter+(letterConf>0?' ('+letterConf+'%)':''), l:'字母识别'}]:[]),
    {v:area+' px²', l:'形状面积 ('+areaPct+'%)'},
    {v:bbox?bbox[1]+'×'+bbox[2]+' px':'-', l:'外接矩形'},
    {v:vertices+' 个', l:'顶点数'},
    {v:circularity+'%', l:'圆度'},
  ];

  document.getElementById('detStats').innerHTML = stats.map(s=>
    `<div class="stat-card"><div class="val">${s.v}</div><div class="lbl">${s.l}</div></div>`
  ).join('');

  // OCR 置信度条 — 从描述中提取所有候选
  const allOcr = [];
  // 尝试匹配 字母识别 行
  let mLet = desc.match(/【字母识别】\s*(\S+)\s*\(置信度\s*(\d+)%\)/);
  if(mLet) allOcr.push({c:mLet[1], s:parseInt(mLet[2])});
  // 尝试匹配 可能字母 行
  let mMay = desc.match(/【可能字母】\s*(.+)/);
  if(mMay) {
    mMay[1].split(',').forEach(p=>{
      const m = p.trim().match(/(\S+)\((\d+)%\)/);
      if(m && !allOcr.find(x=>x.c===m[1])) allOcr.push({c:m[1], s:parseInt(m[2])});
    });
  }
  // 尝试匹配 其他可能 行
  let mOth = desc.match(/【其他可能】\s*(.+)/);
  if(mOth) {
    mOth[1].split(',').forEach(p=>{
      const m = p.trim().match(/(\S+)\((\d+)%\)/);
      if(m && !allOcr.find(x=>x.c===m[1])) allOcr.push({c:m[1], s:parseInt(m[2])});
    });
  }
  if(allOcr.length>0) {
    letter = allOcr[0].c;
    letterConf = allOcr[0].s;
    document.getElementById('ocrBars').innerHTML = `
      <div style="font-size:13px;color:var(--muted);margin-bottom:6px">字母匹配置信度</div>
      ${allOcr.slice(0,6).map((it,i)=>`
        <div style="display:flex;align-items:center;gap:8px;margin:4px 0">
          <span style="width:30px;font-weight:bold;color:${i===0?'var(--accent2)':'var(--muted)'}">${it.c}</span>
          <div style="flex:1;height:8px;background:#1a1a3e;border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${it.s}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px"></div>
          </div>
          <span style="font-size:11px;color:var(--muted);width:35px">${it.s}%</span>
        </div>
      `).join('')}`;
  }

  // 过程图
  if(data.result_dir) {
    const steps = ['00_original','01_block_level','02_motion_residual','03_refined_blocks','04_pixel_mask_raw','05_final_overlay'];
    const labels = ['原始帧','块级降采样','运动残差','精炼掩码','像素掩码','最终结果'];
    document.getElementById('detSteps').innerHTML = steps.map((s,i)=>`
      <div>
        <img src="/${data.result_dir}/${s}.png?t=${Date.now()}" alt="${labels[i]}" loading="lazy">
        <div class="step-label">${i+1}. ${labels[i]}</div>
      </div>
    `).join('');
  }

  // 图表
  drawCharts(data);
}

function drawCharts(data) {
  const desc = data.description||'';
  const get = (re,d='0') => { const m=desc.match(re); return m?parseFloat(m[1]):parseFloat(d); };

  // 雷达图: 几何特征
  const ctx1 = document.getElementById('chartGeometry');
  if(ctx1._chart) ctx1._chart.destroy();
  ctx1._chart = new Chart(ctx1, {
    type: 'radar',
    data: {
      labels: ['圆度','凸度','饱和度','宽高比归一化','顶点归一化'],
      datasets: [{
        label: '检测值',
        data: [
          get(/接近圆:\s*([\d.]+)%/,0),
          get(/凸程度:\s*([\d.]+)%/,0),
          get(/饱满度:\s*([\d.]+)%/,0),
          Math.min(100,Math.abs(1-get(/宽高比:\s*([\d.]+)/,1))*100),
          Math.min(100,get(/顶点数量:\s*(\d+)/,0)*8),
        ],
        backgroundColor: 'rgba(99,102,241,0.2)',
        borderColor: '#6366f1',
      },{
        label: '正方形参考',
        data: [78,100,100,100,32],
        backgroundColor: 'rgba(6,182,212,0.1)',
        borderColor: '#06b6d4',
        borderDash: [3,3],
        pointRadius: 0,
      }]
    },
    options: {
      responsive:true,
      scales:{r:{min:0,max:100,ticks:{display:false}}},
      plugins:{title:{display:true,text:'几何特征雷达图',color:'#888',font:{size:13}}}
    }
  });

  // 方向图
  const ctx2 = document.getElementById('chartMotion');
  if(ctx2._chart) ctx2._chart.destroy();
  const bgDir = data.bg_direction ? `${data.bg_direction[0].toFixed(1)},${data.bg_direction[1].toFixed(1)}` : '0,0';
  const shDir = data.shape_direction ? `${data.shape_direction[0].toFixed(1)},${data.shape_direction[1].toFixed(1)}` : '0,0';
  const bgDy = parseFloat(bgDir.split(',')[0])||0;
  const bgDx = parseFloat(bgDir.split(',')[1])||0;
  const shDy = parseFloat(shDir.split(',')[0])||0;
  const shDx = parseFloat(shDir.split(',')[1])||0;
  const bgDeg = Math.atan2(bgDx, bgDy) * 180 / Math.PI;
  const shDeg = Math.atan2(shDx, shDy) * 180 / Math.PI;

  ctx2._chart = new Chart(ctx2, {
    type: 'polarArea',
    data: {
      labels: ['背景', '形状'],
      datasets: [{
        data: [1, data.found?1:0.1],
        backgroundColor: ['rgba(99,102,241,0.6)','rgba(6,182,212,0.6)'],
        borderColor: ['#6366f1','#06b6d4'],
      }]
    },
    options: {
      responsive:true,
      plugins:{
        title:{display:true,text:`运动方向  背景:${bgDeg.toFixed(0)}°  形状:${shDeg.toFixed(0)}°`,color:'#888',font:{size:13}},
        legend:{display:false}
      }
    }
  });
}

// ============ 验证码 ============
let capToken = '';
async function refreshCap() {
  const vid = document.getElementById('capVid');
  document.getElementById('capInput').value = '';
  document.getElementById('capResult').innerHTML = '';
  try {
    const r = await fetch('/api/captcha/generate');
    const d = await r.json();
    capToken = d.token;
    vid.src = d.video_url+'?t='+Date.now();
    vid.play();
  } catch(e) { alert('Error'); }
}
async function verifyCap() {
  const ans = document.getElementById('capInput').value.trim();
  if(!ans) return;
  try {
    const r = await fetch('/api/captcha/verify',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:capToken,answer:ans}),
    });
    const d = await r.json();
    document.getElementById('capResult').innerHTML = d.success
      ? '<span class="badge badge-ok">✓ '+d.message+'</span>'
      : '<span class="badge badge-err">✗ '+d.message+'</span>';
    if(d.success) setTimeout(refreshCap, 2000);
  } catch(e) {}
}
refreshCap();
</script>
</body>
</html>
