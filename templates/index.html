<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马赛克形状识别</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
header{background:#1a1a2e;padding:16px 24px;text-align:center;border-bottom:2px solid #333}
header h1{font-size:22px;background:linear-gradient(135deg,#00d2ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav{display:flex;justify-content:center;gap:4px;padding:12px;background:#12122a}
nav button{padding:10px 28px;border:none;background:#1a1a3e;color:#aaa;cursor:pointer;font-size:15px;border-radius:8px 8px 0 0;transition:.2s}
nav button.active{background:#1e1e4a;color:#00d2ff;font-weight:bold}
nav button:hover{color:#00d2ff}
.tab{display:none;max-width:900px;margin:0 auto;padding:24px}
.tab.active{display:block}
.card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:24px;margin-bottom:20px}
.card h3{font-size:17px;margin-bottom:16px;color:#00d2ff}
.form-row{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:6px;min-width:140px}
.form-group label{font-size:13px;color:#888}
.form-group select,.form-group input[type=text],.form-group input[type=number]{padding:8px 12px;background:#0f0f1a;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:14px}
.form-group select:focus,.form-group input:focus{outline:none;border-color:#00d2ff}
.shape-grid{display:flex;flex-wrap:wrap;gap:8px}
.shape-btn{padding:8px 16px;background:#0f0f1a;border:1px solid #333;border-radius:6px;color:#ccc;cursor:pointer;font-size:14px;min-width:44px;text-align:center;transition:.2s}
.shape-btn:hover{border-color:#00d2ff;color:#fff}
.shape-btn.selected{background:#1a1a5e;border-color:#00d2ff;color:#00d2ff;font-weight:bold}
.btn{padding:10px 28px;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:bold;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#00d2ff,#7b2ff7);color:#fff}
.btn-primary:hover{opacity:0.85;transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-secondary{background:#1a1a3e;color:#ccc;border:1px solid #333}
.result-box{background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;padding:16px;margin-top:16px;white-space:pre-wrap;font-family:'Consolas',monospace;font-size:13px;line-height:1.6;max-height:400px;overflow-y:auto}
.video-wrap{text-align:center;margin:16px 0}
.video-wrap video{max-width:100%;border-radius:8px;border:1px solid #333}
.loading{text-align:center;padding:40px;color:#888}
.spinner{display:inline-block;width:40px;height:40px;border:3px solid #333;border-top-color:#00d2ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.img-grid img{width:100%;border-radius:6px;border:1px solid #2a2a4a}
.status{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:bold}
.status-ok{background:#0a3a0a;color:#4caf50}
.status-fail{background:#3a0a0a;color:#f44336}
.captcha-box{text-align:center}
.captcha-box input[type=text]{padding:12px 18px;background:#0f0f1a;border:2px solid #333;border-radius:8px;color:#e0e0e0;font-size:20px;width:200px;text-align:center;letter-spacing:4px}
.captcha-box input:focus{outline:none;border-color:#00d2ff}
</style>
</head>
<body>

<header><h1>Mosaic Shape Detection</h1></header>

<nav>
  <button class="active" onclick="switchTab('generate')">生成视频</button>
  <button onclick="switchTab('detect')">识别形状</button>
  <button onclick="switchTab('captcha')">验证码</button>
</nav>

<!-- ============ Tab 1: 生成视频 ============ -->
<div id="tab-generate" class="tab active">
  <div class="card">
    <h3>选择形状</h3>
    <div class="shape-grid" id="shapeGrid"></div>
  </div>
  <div class="card">
    <h3>运动方向</h3>
    <div class="form-row">
      <div class="form-group">
        <label>背景移动方向</label>
        <select id="bgDir">
          <option value="right">→ 右</option><option value="left">← 左</option>
          <option value="up">↑ 上</option><option value="down" selected>↓ 下</option>
          <option value="upright">↗ 右上</option><option value="upleft">↖ 左上</option>
          <option value="downright">↘ 右下</option><option value="downleft">↙ 左下</option>
          <option value="static">静止</option>
        </select>
      </div>
      <div class="form-group">
        <label>形状内部移动方向</label>
        <select id="shDir">
          <option value="right" selected>→ 右</option><option value="left">← 左</option>
          <option value="up">↑ 上</option><option value="down">↓ 下</option>
          <option value="upright">↗ 右上</option><option value="upleft">↖ 左上</option>
          <option value="downright">↘ 右下</option><option value="downleft">↙ 左下</option>
          <option value="static">静止</option>
        </select>
      </div>
      <div class="form-group">
        <label>时长(秒)</label>
        <input type="number" id="duration" value="4" min="2" max="10">
      </div>
      <div class="form-group" style="justify-content:flex-end">
        <button class="btn btn-primary" id="btnGenerate" onclick="generateVideo()">生成视频</button>
      </div>
    </div>
  </div>
  <div class="card" id="videoCard" style="display:none">
    <h3>生成的视频</h3>
    <div class="video-wrap"><video id="genVideo" controls autoplay loop></video></div>
  </div>
  <div id="genLoading" class="loading" style="display:none"><div class="spinner"></div><p>正在生成视频...</p></div>
</div>

<!-- ============ Tab 2: 识别形状 ============ -->
<div id="tab-detect" class="tab">
  <div class="card">
    <h3>上传视频</h3>
    <div class="form-row">
      <input type="file" id="detectFile" accept="video/mp4,video/avi,video/mov" style="color:#ccc">
      <button class="btn btn-primary" id="btnDetect" onclick="detectShape()">开始识别</button>
    </div>
  </div>
  <div id="detectLoading" class="loading" style="display:none"><div class="spinner"></div><p>正在分析视频中的形状...</p></div>
  <div id="detectResult" style="display:none">
    <div class="card">
      <h3>识别结果</h3>
      <div class="result-box" id="detectText"></div>
    </div>
    <div class="card" id="detectImages" style="display:none">
      <h3>检测过程</h3>
      <div class="img-grid" id="detectImgGrid"></div>
    </div>
  </div>
</div>

<!-- ============ Tab 3: 验证码 ============ -->
<div id="tab-captcha" class="tab">
  <div class="card">
    <h3>马赛克动态验证码</h3>
    <p style="color:#888;margin-bottom:12px">请观看视频，输入你在视频中看到的<strong>形状/字母/数字</strong></p>
    <div class="captcha-box">
      <div class="video-wrap"><video id="captchaVideo" controls autoplay loop style="max-width:400px"></video></div>
      <div style="margin:16px 0">
        <input type="text" id="captchaInput" placeholder="输入答案" maxlength="10" autofocus
               onkeydown="if(event.key==='Enter')verifyCaptcha()">
      </div>
      <button class="btn btn-primary" id="btnCaptchaVerify" onclick="verifyCaptcha()">验证</button>
      <button class="btn btn-secondary" onclick="refreshCaptcha()" style="margin-left:8px">换一个</button>
      <div id="captchaResult" style="margin-top:16px"></div>
    </div>
  </div>
</div>

<script>
// ==================== 初始化 ====================
const SHAPES = {
  letters: 'A B C D E F G H J K L M N P Q R S T U V W X Y Z'.split(' '),
  numbers: '2 3 4 5 6 7 8 9'.split(' '),
  geometry: 'square circle triangle star hexagon diamond cross heart'.split(' '),
};

let selectedShape = 'A';

function buildShapeGrid() {
  const grid = document.getElementById('shapeGrid');
  const all = [...SHAPES.letters, ...SHAPES.numbers, ...SHAPES.geometry];
  grid.innerHTML = all.map(s =>
    `<button class="shape-btn${s===selectedShape?' selected':''}" onclick="selectShape('${s}')">${s}</button>`
  ).join('');
}
function selectShape(s) {
  selectedShape = s;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.toggle('selected', b.textContent === s));
}
buildShapeGrid();

// ==================== Tab 切换 ====================
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('active', false));
  document.getElementById('tab-' + name).classList.add('active');
  const tabs = ['generate', 'detect', 'captcha'];
  document.querySelectorAll('nav button')[tabs.indexOf(name)].classList.add('active');
}
document.querySelectorAll('nav button').forEach((btn, i) => {
  btn.addEventListener('click', () => switchTab(['generate','detect','captcha'][i]));
});

// ==================== Tab 1: 生成视频 ====================
async function generateVideo() {
  const btn = document.getElementById('btnGenerate');
  const loading = document.getElementById('genLoading');
  const card = document.getElementById('videoCard');
  const video = document.getElementById('genVideo');

  btn.disabled = true;
  loading.style.display = 'block';
  card.style.display = 'none';

  try {
    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        shape: selectedShape,
        bg_direction: document.getElementById('bgDir').value,
        shape_direction: document.getElementById('shDir').value,
        duration: parseInt(document.getElementById('duration').value) || 4,
        block_size: 4,
      }),
    });
    if (!resp.ok) throw new Error(await resp.text());
    const blob = await resp.blob();
    video.src = URL.createObjectURL(blob);
    card.style.display = 'block';
  } catch(e) {
    alert('生成失败: ' + e.message);
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

// ==================== Tab 2: 识别形状 ====================
async function detectShape() {
  const fileInput = document.getElementById('detectFile');
  const file = fileInput.files[0];
  if (!file) { alert('请先选择视频文件'); return; }

  const btn = document.getElementById('btnDetect');
  const loading = document.getElementById('detectLoading');
  const resultDiv = document.getElementById('detectResult');
  const textDiv = document.getElementById('detectText');
  const imgDiv = document.getElementById('detectImages');
  const imgGrid = document.getElementById('detectImgGrid');

  btn.disabled = true;
  loading.style.display = 'block';
  resultDiv.style.display = 'none';

  try {
    const form = new FormData();
    form.append('video', file);
    const resp = await fetch('/api/detect', { method: 'POST', body: form });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error);

    if (!data.found) {
      textDiv.textContent = data.message;
    } else {
      textDiv.textContent = data.description;
    }
    resultDiv.style.display = 'block';

    // 加载过程图片
    if (data.result_dir) {
      const steps = ['00_original', '01_block_level', '02_motion_residual',
                     '03_refined_blocks', '04_pixel_mask_raw', '05_final_overlay'];
      imgGrid.innerHTML = '';
      steps.forEach((s, i) => {
        const img = document.createElement('img');
        img.src = '/' + data.result_dir + '/' + s + '.png?t=' + Date.now();
        img.alt = 'Step ' + (i+1);
        img.title = ['原始帧','块级降采样','运动残差','精炼掩码','像素级掩码','最终叠加'][i];
        img.onerror = function() { this.style.display = 'none'; };
        imgGrid.appendChild(img);
      });
      imgDiv.style.display = 'block';
    }
  } catch(e) {
    alert('识别失败: ' + e.message);
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}

// ==================== Tab 3: 验证码 ====================
let captchaToken = '';

async function refreshCaptcha() {
  const video = document.getElementById('captchaVideo');
  const input = document.getElementById('captchaInput');
  const result = document.getElementById('captchaResult');
  input.value = '';
  result.innerHTML = '';
  video.style.opacity = '0.5';

  try {
    const resp = await fetch('/api/captcha/generate');
    const data = await resp.json();
    captchaToken = data.token;
    video.src = data.video_url + '?t=' + Date.now();
    video.style.opacity = '1';
    video.play();
    input.focus();
  } catch(e) {
    alert('加载验证码失败');
  }
}

async function verifyCaptcha() {
  const input = document.getElementById('captchaInput');
  const result = document.getElementById('captchaResult');
  const answer = input.value.trim();
  if (!answer) { alert('请输入答案'); return; }

  try {
    const resp = await fetch('/api/captcha/verify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token: captchaToken, answer }),
    });
    const data = await resp.json();
    result.innerHTML = data.success
      ? '<span class="status status-ok">✓ 验证通过: ' + data.message + '</span>'
      : '<span class="status status-fail">✗ 验证失败: ' + data.message + '</span>';
    if (data.success) {
      setTimeout(refreshCaptcha, 2000);
    }
  } catch(e) {
    alert('验证失败: ' + e.message);
  }
}

// 初始化 CAPTCHA
refreshCaptcha();
</script>
</body>
</html>
